name: Build PvPHub

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v3

      - name: ☕ Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Compilar
        run: mvn clean package

      - name: 📦 Subir JAR
        uses: actions/upload-artifact@v4
        with:
          name: PvPHub
          path: target/*.jar
